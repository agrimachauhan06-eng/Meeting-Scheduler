{% extends "base.html" %}
{% block title %}Calendar — Nexus{% endblock %}

{% block extra_css %}
<style>
    .fc-theme-standard td, .fc-theme-standard th { border-color: var(--border) !important; }
    .fc-theme-standard .fc-scrollgrid { border-color: var(--border) !important; }
    .fc .fc-daygrid-day { background: transparent !important; }
    .fc .fc-col-header-cell { background: var(--bg-2) !important; }
    .fc .fc-list-event:hover td { background: var(--bg-card-hover) !important; }
    .fc .fc-list-day-cushion { background: var(--bg-2) !important; }
    .fc .fc-list-event td { border-color: var(--border) !important; color: var(--text) !important; }
    .fc .fc-list-empty { background: var(--bg-card) !important; color: var(--text-muted) !important; }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title">Calendar</div>
    <a href="/meetings/new" class="btn-nexus"><i class="bi bi-plus-lg"></i> New Meeting</a>
</div>

<div class="card-glass p-3">
    <div id="calendar"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
        },
        events: '/api/meetings',
        editable: false,
        selectable: true,
        nowIndicator: true,
        eventTimeFormat: { hour: '2-digit', minute: '2-digit', meridiem: 'short' },
        eventClick: function(info) {
            info.jsEvent.preventDefault();
            if (info.event.url) window.location.href = info.event.url;
        },
        eventDidMount: function(info) {
            var props = info.event.extendedProps;
            var tooltip = info.event.title;
            if (props.location) tooltip += '\n📍 ' + props.location;
            if (props.status)   tooltip += '\n● ' + props.status;
            info.el.setAttribute('title', tooltip);
        },
        height: 'auto',
    });
    calendar.render();
});
</script>
{% endblock %}
